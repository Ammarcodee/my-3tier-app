services:
  mongodb:
    image: mongo:6
    container_name: mongodb
    ports:
      - 27017:27017
    volumes:
      - mongo_data:/data/db
    restart: always

  backend:
    build: ./backend
    container_name: backend
    ports:
      - 5000:5000
    environment:
      - MONGO_URI=mongodb://mongodb:27017/taskdb
      - JWT_SECRET=prod_secret_key_123
    depends_on:
      - mongodb
    restart: always

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - 80:80
    depends_on:
      - backend
    restart: always

volumes:
  mongo_data:
